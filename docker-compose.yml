services:
  web:
    image: "nginx:${NGINX_VERSION}"
    container_name: ${CONTAINER_NAME}
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - frontend_network
  api:
    image: alpine
    command: tail -f /dev/null
    container_name: api
    networks:
      - backend_network
      - frontend_network
  db: 
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: example
    container_name: db
    networks:
      - backend_network
networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge

      